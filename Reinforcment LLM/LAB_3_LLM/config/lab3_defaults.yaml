seed: 2112

environment:
  cartpole_id: CartPole-v1
  lunarlander_id: LunarLander-v3
  lunarlander_kwargs:
    continuous: false
    enable_wind: false

reinforce_cartpole:
  gamma: 0.98
  lr_policy: 0.0003
  num_episodes: 1000
  eval_every: 50
  eval_episodes: 20
  entropy_coef: 0.01
  grad_clip: 1.0
  solved_threshold: 500.0

value_baseline_cartpole:
  gamma: 0.98
  lr_policy: 0.0003
  lr_value: 0.001
  num_episodes: 1000
  eval_every: 50
  eval_episodes: 20
  entropy_coef: 0.01
  grad_clip: 1.0
  solved_threshold: 500.0

a2c_cartpole:
  gamma: 0.99
  lr: 0.0003
  num_episodes: 800
  eval_every: 25
  eval_episodes: 20
  gae_lambda: 0.95
  entropy_coef: 0.01
  grad_clip: 0.5
  solved_threshold: 475.0

a2c_lunarlander:
  reference:
    gymnasium_env: LunarLander-v3
    gymnasium_url: https://gymnasium.farama.org/environments/box2d/lunar_lander/
    sb3_a2c_url: https://stable-baselines3.readthedocs.io/en/master/modules/a2c.html
    rl_zoo_a2c_url: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/a2c.yml
    note: "RL Zoo tuned A2C for LunarLander-v3 uses n_envs=8, n_timesteps=2e5, gamma=0.995, n_steps=5, learning_rate=0.00083 and ent_coef=0.00001."
  gamma: 0.995
  lr: 0.00083
  total_timesteps: 200000
  n_steps: 5
  eval_every: 250
  eval_episodes: 50
  gae_lambda: 1.0
  entropy_coef: 0.00001
  entropy_coef_min: 0.00001
  value_coef: 0.5
  reward_scale: 100.0
  grad_clip: 0.5
  optimizer_name: rmsprop
  normalize_advantage: false
  solved_threshold: 200.0
  selection_metric: avg_return
  selection_mode: sample
  selection_temperature: 1.0
  selection_episodes: 100
  policy_selection_metric: avg_return
  policy_selection_episodes: 100
  policy_selection_top_k: 4
  policy_selection_include_greedy: true
  final_eval_episodes: 200
  visual_episodes: 5
  temperature_grid: [0.50, 0.65, 0.75, 0.80, 0.85, 0.90, 0.95, 1.00, 1.05, 1.10, 1.25]
  include_existing_checkpoints: true
  include_old_checkpoints: false
  skip_completed_training_presets: true
  default_experiments:
    - separate_current_long
    - landing_refine_current_long
    - landing_precision_current
  experiments:
    sb3_zoo_short:
      description: "Fast run inspired by RL Zoo tuned A2C hyperparameters."
      n_envs: 8
      seed_offset: 4000
      checkpoint: a2c_lunarlander_sb3_zoo_short.pt
      initial_checkpoint:
      total_timesteps: 100000
      n_steps: 5
      gamma: 0.995
      lr: 0.00083
      value_coef: 0.5
      entropy_coef: 0.00001
      entropy_coef_min: 0.00001
      reward_scale: 100.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 20
    sb3_zoo_full:
      description: "RL Zoo reference budget adapted to this local A2C implementation."
      n_envs: 8
      seed_offset: 4100
      checkpoint: a2c_lunarlander_sb3_zoo_full.pt
      initial_checkpoint:
      total_timesteps: 200000
      n_steps: 5
      gamma: 0.995
      lr: 0.00083
      value_coef: 0.5
      entropy_coef: 0.00001
      entropy_coef_min: 0.00001
      reward_scale: 100.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 50
    separate_short:
      description: "Fast version of the old separate actor-critic run."
      n_envs: 8
      seed_offset: 5000
      checkpoint: a2c_lunarlander_separate_short.pt
      initial_checkpoint:
      total_timesteps: 100000
      n_steps: 5
      gamma: 0.995
      lr: 0.00083
      value_coef: 0.5
      entropy_coef: 0.0005
      entropy_coef_min: 0.00001
      reward_scale: 1.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 20
    separate_full_old:
      description: "Full old separate actor-critic run from Lab3_A2C."
      n_envs: 16
      seed_offset: 5100
      checkpoint: best_a2c_lunarlander_separate_seed2112.pt
      initial_checkpoint:
      total_timesteps: 1000000
      n_steps: 5
      gamma: 0.995
      lr: 0.00083
      value_coef: 0.5
      entropy_coef: 0.0005
      entropy_coef_min: 0.00001
      reward_scale: 1.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 50
    separate_current_long:
      description: "Full reproducible separate actor-critic run generated inside LAB_3_LLM."
      n_envs: 16
      seed_offset: 5200
      checkpoint: a2c_lunarlander_separate_current_long.pt
      initial_checkpoint:
      total_timesteps: 1000000
      n_steps: 5
      gamma: 0.995
      lr: 0.00083
      value_coef: 0.5
      entropy_coef: 0.0005
      entropy_coef_min: 0.00001
      reward_scale: 1.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 50
    landing_refine_short:
      description: "Fast refinement from the separate_short checkpoint generated by this notebook."
      n_envs: 8
      seed_offset: 7000
      checkpoint: a2c_lunarlander_landing_refine_short.pt
      initial_checkpoint: a2c_lunarlander_separate_short.pt
      total_timesteps: 50000
      n_steps: 5
      gamma: 0.995
      lr: 0.0001
      value_coef: 0.5
      entropy_coef: 0.00008
      entropy_coef_min: 0.00001
      reward_scale: 1.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 20
    landing_refine_full_old:
      description: "Full old landing-refinement run from Lab3_A2C."
      n_envs: 16
      seed_offset: 7100
      checkpoint: best_a2c_lunarlander_landing_refine_seed2112.pt
      initial_checkpoint: best_a2c_lunarlander_separate_seed2112.pt
      total_timesteps: 300000
      n_steps: 5
      gamma: 0.995
      lr: 0.0001
      value_coef: 0.5
      entropy_coef: 0.00008
      entropy_coef_min: 0.00001
      reward_scale: 1.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 100
    landing_refine_current_long:
      description: "Current landing refinement from the LAB_3_LLM separate_current_long checkpoint."
      n_envs: 16
      seed_offset: 7200
      checkpoint: a2c_lunarlander_landing_refine_current_long.pt
      initial_checkpoint: a2c_lunarlander_separate_current_long.pt
      total_timesteps: 300000
      n_steps: 5
      gamma: 0.995
      lr: 0.0001
      value_coef: 0.5
      entropy_coef: 0.00008
      entropy_coef_min: 0.00001
      reward_scale: 1.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 100
    landing_precision_current:
      description: "Low-learning-rate precision refinement from the current refinement best-train checkpoint."
      n_envs: 16
      seed_offset: 7300
      checkpoint: a2c_lunarlander_landing_precision_current.pt
      initial_checkpoint: a2c_lunarlander_landing_refine_current_long_best_train.pt
      total_timesteps: 500000
      n_steps: 5
      gamma: 0.995
      lr: 0.00005
      value_coef: 0.5
      entropy_coef: 0.00001
      entropy_coef_min: 0.000001
      reward_scale: 1.0
      gae_lambda: 1.0
      normalize_advantage: false
      optimizer_name: rmsprop
      eval_every: 250
      eval_episodes: 100
