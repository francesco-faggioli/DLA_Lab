      patience: 5
      max_grad_norm: 1.0
      use_amp: true
    batch_size_key: batch_size_head_only_original

  SGD_FocalLoss:
    description: Preliminary head-only screening run with SGD and FocalLoss.
    model:
      name: resnet18
      weights: DEFAULT
      freeze_backbone: true
      unfreeze_layer4: false
    training:
      epochs: 10
      optimizer: SGD
      learning_rate: 0.001
      momentum: 0.9
      weight_decay: 0.0
      loss: FocalLoss
      alpha_focal: 1.0
      gamma_focal: 2.0
      scheduler: step
